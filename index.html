<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashley's Daily Job Report</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; padding: 1rem; }
.container { max-width: 820px; margin: 0 auto; }

.header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; padding-bottom: 0.6rem; border-bottom: 1px solid #e0dfd8; margin-bottom: 0.75rem; }
.header-left { display: flex; align-items: center; gap: 10px; }
.header h1 { font-size: 15px; font-weight: 600; color: #1a1a18; }
.header p { font-size: 11px; color: #888780; }
.freshbadge { font-size: 10px; background: #EAF3DE; color: #3B6D11; padding: 2px 7px; border-radius: 99px; font-weight: 500; white-space: nowrap; }

.motd { background: white; border: 1px solid #e0dfd8; border-left: 3px solid #185FA5; border-radius: 8px; padding: 0.6rem 0.9rem; margin-bottom: 0.9rem; display: flex; align-items: flex-start; gap: 10px; }
.motd-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.motd-text { font-size: 13px; color: #2c2c2a; line-height: 1.5; }
.motd-text strong { font-weight: 600; color: #1a1a18; display: block; margin-bottom: 2px; font-size: 12px; }

.api-box { background: white; border: 1px solid #e0dfd8; border-radius: 10px; padding: 0.7rem 1rem; margin-bottom: 0.9rem; }
.api-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.api-box label { font-size: 12px; color: #5f5e5a; white-space: nowrap; }
.api-box input { flex: 1; min-width: 180px; border: 1px solid #d3d1c7; border-radius: 7px; padding: 5px 9px; font-size: 12px; font-family: monospace; color: #1a1a18; background: #f5f5f3; }
.api-box input:focus { outline: none; border-color: #888780; background: white; }
.saved-badge { font-size: 10px; color: #3B6D11; background: #EAF3DE; padding: 2px 7px; border-radius: 99px; display: none; }
.clear-btn { font-size: 11px; color: #a32d2d; background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; display: none; }
.api-note { font-size: 10px; color: #b4b2a9; margin-top: 5px; }
.api-note a { color: #185FA5; }

.controls { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
.fb { background: white; border: 1px solid #d3d1c7; border-radius: 7px; padding: 5px 12px; font-size: 12px; cursor: pointer; color: #1a1a18; }
.fb.active { background: #f1efe8; border-color: #888780; font-weight: 500; }
.rb { background: white; border: 1px solid #d3d1c7; border-radius: 7px; padding: 5px 12px; font-size: 12px; cursor: pointer; margin-left: auto; color: #1a1a18; }
.rb:disabled { opacity: 0.45; cursor: not-allowed; }

.card { background: white; border: 1px solid #e0dfd8; border-radius: 10px; padding: 0.85rem 1rem; margin-bottom: 0.65rem; }
.jtitle { font-size: 14px; font-weight: 500; }
.jco { font-size: 12px; color: #888780; margin-top: 2px; }
.badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; }
.bp { background: #EEEDFE; color: #3C3489; }
.bl { background: #E6F1FB; color: #0C447C; }
.bg { background: #EAF3DE; color: #3B6D11; }
.bs { background: #f1efe8; color: #5f5e5a; border: 1px solid #e0dfd8; }
.bdate { background: #FAEEDA; color: #854F0B; }
.jsumm { font-size: 12px; color: #5f5e5a; margin-top: 8px; line-height: 1.6; }
.jlink { display: inline-block; margin-top: 8px; font-size: 12px; color: #185FA5; text-decoration: none; }

.loading { text-align: center; padding: 3rem; color: #888780; font-size: 13px; }
.spinner { width: 24px; height: 24px; border: 2px solid #e0dfd8; border-top-color: #888780; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.errmsg { background: #fcebeb; border: 1px solid #f7c1c1; border-radius: 8px; padding: 0.85rem; font-size: 12px; color: #a32d2d; margin-bottom: 1rem; }
.errmsg code { font-family: monospace; font-size: 10px; display: block; margin-top: 5px; white-space: pre-wrap; word-break: break-all; }
.cnt { display: inline-block; background: #f1efe8; border: 1px solid #e0dfd8; border-radius: 99px; font-size: 11px; padding: 1px 8px; margin-left: 6px; color: #888780; }
.empty { font-size: 13px; color: #888780; padding: 2rem 0; text-align: center; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-left">
      <div>
        <h1>Ashley's daily job report <span class="cnt" id="cnt" style="display:none"></span></h1>
        <p id="subtitle">med-device &middot; MSL &middot; product &middot; clinical ed &middot; sales ops &middot; Indeed, LinkedIn, ZipRecruiter</p>
      </div>
      <span class="freshbadge">Last 48 hrs</span>
    </div>
  </div>

  <div class="motd" id="motd">
    <div class="motd-icon" id="motd-icon"></div>
    <div class="motd-text"><strong id="motd-title"></strong><span id="motd-body"></span></div>
  </div>

  <div class="api-box">
    <div class="api-row">
      <label for="apikey">API key</label>
      <input type="password" id="apikey" placeholder="sk-ant-..." autocomplete="off" oninput="onKeyInput()" />
      <span class="saved-badge" id="saved-badge">Saved</span>
      <button class="clear-btn" id="clear-btn" onclick="clearKey()">forget</button>
    </div>
    <div class="api-note" id="api-note">Enter your key once and it will be saved to this browser. Get one at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>.</div>
  </div>

  <div class="controls">
    <button class="fb active" onclick="setFilter('all',this)">All</button>
    <button class="fb" onclick="setFilter('product',this)">Product / APM</button>
    <button class="fb" onclick="setFilter('msl',this)">MSL</button>
    <button class="fb" onclick="setFilter('sales',this)">Sales / enablement</button>
    <button class="fb" onclick="setFilter('cs',this)">Client success</button>
    <button class="fb" onclick="setFilter('clinical',this)">Clinical ed</button>
    <button class="fb" onclick="setFilter('remote',this)">Remote</button>
    <button class="rb" id="rbtn" onclick="fetchJobs()">&#8635; Refresh</button>
  </div>

  <div id="status"></div>
  <div id="jobs"><div class="empty">Loading...</div></div>
</div>

<script>
var allJobs=[],activeFilter='all';
var TITLES="Associate Product Manager (medical device), Product Manager (medical device), Medical Science Liaison, Sales Force Enablement / Training, Client Success Manager, Clinical Education Specialist, Staff Sales Operations Analyst, Customer Success / Account Manager";
var COMPANIES="BD, Arthrex, Stryker, Medtronic, Biotronik, Abbott, Zimmer Biomet, Boston Scientific, Insulet, Edwards Lifesciences, DePuy Synthes, Dexcom, Intuitive Surgical, Smith & Nephew, Globus Medical, Synergy Spine Solutions, Gore, Personify Health, Prompt AI, Ambience Healthcare, Limber Health";
var LS_KEY='ashley_job_board_api_key';

var MESSAGES = [
  { icon: '🌟', title: 'Your clinical expertise is your superpower.', body: '15 years of patient outcomes, team leadership, and real-world ortho knowledge — that’s exactly what med-device companies are looking for.' },
  { icon: '💪', title: 'Every application is a rep.', body: 'The more you put out there, the stronger your job-search muscle gets. Keep showing up — it compounds.' },
  { icon: '🎯', title: 'You’re not starting over. You’re leveling up.', body: 'A career pivot with your background isn’t a step back — it’s bringing a decade and a half of hard-won insight to a brand new arena.' },
  { icon: '💡', title: 'Informational interviews open doors.', body: 'Reach out to one MSL or clinical educator today on LinkedIn. A 20-minute conversation can move faster than 20 applications.' },
  { icon: '✨', title: 'Your DPT + OCS combination is rare in industry.', body: 'Most candidates don’t have your clinical credibility. Lead with it — in your cover letter, your LinkedIn, and every conversation.' },
  { icon: '📈', title: 'Consistency beats intensity.', body: 'Checking this board every morning and applying to 2–3 strong fits per week will outperform a frantic weekend blitz every time.' },
  { icon: '🤝', title: 'Your network is bigger than you think.', body: 'Former colleagues, PT students you mentored, physicians you collaborated with — let them know you’re looking. Referrals land interviews.' },
  { icon: '🏆', title: 'Clinic director is a serious credential.', body: 'P&L ownership, hiring, budget management, performance metrics — you’ve done it all. That’s not a PT background, that’s a business leadership background.' },
  { icon: '🌍', title: 'The med-device world needs people like you.', body: 'Companies spend millions training reps and MSLs who have never treated a patient. You already speak the language clinicians trust.' },
  { icon: '🔥', title: 'Rejection is redirection.', body: 'Every “not this time” is narrowing the field toward the role that’s actually the right fit. Keep going.' },
  { icon: '📝', title: 'Tailor one application today.', body: 'A cover letter that speaks directly to the job description outperforms a generic one every time. Take 15 minutes to make it specific.' },
  { icon: '🧠', title: 'You understand the buyer better than anyone.', body: 'PT and ortho surgeons are major customers for med-device companies. Your relationships and clinical fluency are worth real revenue to them.' },
  { icon: '⚡}', title: 'Small steps, big momentum.', body: 'You don’t have to have it all figured out today. Apply to one job, send one message, take one step. That’s how it happens.' },
  { icon: '🏗', title: 'You’ve already built something from nothing.', body: 'You took a struggling clinic and grew it to 9 clinicians with 85% less contract labor. That’s a story that sells itself in any industry interview.' },
];

function showMotd(){
  var day = new Date().getDay();
  var m = MESSAGES[day % MESSAGES.length];
  document.getElementById('motd-icon').textContent = m.icon;
  document.getElementById('motd-title').textContent = m.title;
  document.getElementById('motd-body').textContent = m.body;
}

function loadSavedKey(){
  var saved=localStorage.getItem(LS_KEY);
  if(saved){
    document.getElementById('apikey').value=saved;
    document.getElementById('saved-badge').style.display='';
    document.getElementById('clear-btn').style.display='';
    document.getElementById('api-note').textContent='Key saved to this browser. Click ‚forget” to remove it.';
    fetchJobs();
  } else {
    document.getElementById('jobs').innerHTML='<div class="empty">Enter your API key above and click ↻ Refresh to get started.</div>';
  }
}

function onKeyInput(){
  var key=document.getElementById('apikey').value.trim();
  if(key){
    localStorage.setItem(LS_KEY,key);
    document.getElementById('saved-badge').style.display='';
    document.getElementById('clear-btn').style.display='';
    document.getElementById('api-note').textContent='Key saved to this browser. Click ‚forget” to remove it.';
  }
}

function clearKey(){
  localStorage.removeItem(LS_KEY);
  document.getElementById('apikey').value='';
  document.getElementById('saved-badge').style.display='none';
  document.getElementById('clear-btn').style.display='none';
  document.getElementById('api-note').textContent='Enter your key once and it will be saved to this browser. Get one at console.anthropic.com.';
  document.getElementById('jobs').innerHTML='<div class="empty">Enter your API key above and click ↻ Refresh to get started.</div>';
}

function catLabel(c){return({product:'Product / APM',msl:'MSL',sales:'Sales / enablement',cs:'Client success',clinical:'Clinical ed',ops:'Sales ops'})[c]||c;}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setFilter(f,btn){activeFilter=f;document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderJobs();}
function renderJobs(){var c=document.getElementById('jobs'),el=document.getElementById('cnt'),list=allJobs;if(activeFilter==='remote')list=allJobs.filter(function(j){return j.isRemote;});else if(activeFilter!=='all')list=allJobs.filter(function(j){return j.category===activeFilter;});el.style.display='';el.textContent=list.length+' jobs';if(!list.length){c.innerHTML='<div class="empty">No listings matched this filter.</div>';return;}c.innerHTML=list.map(function(j){return'<div class="card"><div class="jtitle">'+escHtml(j.title)+'</div><div class="jco">'+escHtml(j.company)+'</div><div class="badges"><span class="badge bp">'+catLabel(j.category)+'</span><span class="badge bl">'+escHtml(j.location)+'</span>'+(j.isRemote?'<span class="badge bg">Remote</span>':'')+(j.source?'<span class="badge bs">'+escHtml(j.source)+'</span>':'')+(j.posted?'<span class="badge bdate">'+escHtml(j.posted)+'</span>':'')+(j.salary?'<span class="badge bs">'+escHtml(j.salary)+'</span>':'')+'</div><div class="jsumm">'+escHtml(j.summary)+'</div>'+(j.url?'<a class="jlink" href="'+escHtml(j.url)+'" target="_blank">View listing &rarr;</a>':'')+'</div>';}).join('');}
function showError(msg,detail){document.getElementById('jobs').innerHTML='';document.getElementById('status').innerHTML='<div class="errmsg">'+msg+(detail?'<code>'+escHtml(detail)+'</code>':'')+'</div>';}

function fetchJobs(){
  var key=document.getElementById('apikey').value.trim();
  if(!key){showError('Please enter your Anthropic API key above first.',null);return;}
  var btn=document.getElementById('rbtn');
  btn.disabled=true;btn.textContent='Searching...';
  document.getElementById('status').innerHTML='';
  document.getElementById('jobs').innerHTML='<div class="loading"><div class="spinner"></div>Searching Indeed, LinkedIn, ZipRecruiter & more for jobs posted in the last 48 hours...</div>';
  document.getElementById('cnt').style.display='none';
  var today=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var prompt='Today is '+today+'. Ashley is a licensed PT (DPT, OCS), 15 yrs exp, Clinic Director at Banner PT in Mesa AZ, pivoting to med-device/health-tech. Orthopedic/MSK expertise, P&L, team building, clinical instruction.\n\nSearch SPECIFICALLY on these job sites for listings posted in the LAST 48 HOURS ONLY:\n- Indeed (indeed.com)\n- LinkedIn Jobs (linkedin.com/jobs)\n- ZipRecruiter (ziprecruiter.com)\n- Glassdoor (glassdoor.com/Job)\n- Company career pages\n\nTITLES: '+TITLES+'\nCOMPANIES: '+COMPANIES+'\nLOCATION: Phoenix/Mesa/Gilbert/Chandler/Scottsdale AZ metro OR remote-eligible for AZ candidates.\n\nCRITICAL: ONLY include jobs confirmed posted within the last 48 hours. Exclude anything older or undated.\n\nReturn ONLY raw JSON array (no markdown, no backticks):\n[{"title":"...","company":"...","location":"...","salary":"...or null","source":"Indeed/LinkedIn/ZipRecruiter/etc","posted":"Posted today / Posted 1 day ago","summary":"2-3 sentences why great fit for Ashley","url":"...or null","isRemote":true or false,"category":"product|msl|sales|cs|clinical|ops"}]';
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})})
  .then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error('HTTP '+r.status+': '+t);});return r.json();})
  .then(function(d){if(d.error)throw new Error(d.error.message);var raw='';(d.content||[]).forEach(function(b){if(b.type==='text')raw+=b.text;});raw=raw.replace(/```json|```/g,'').trim();var s=raw.indexOf('['),e=raw.lastIndexOf(']');if(s<0||e<0)throw new Error('No JSON found: '+raw.slice(0,200));allJobs=JSON.parse(raw.slice(s,e+1));if(!allJobs.length)throw new Error('No jobs found in the last 48 hours. Try again later.');document.getElementById('subtitle').textContent='Last refreshed '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})+' · last 48 hrs only';renderJobs();})
  .catch(function(err){showError('Could not load listings:',err.message);})
  .finally(function(){btn.disabled=false;btn.textContent='↻ Refresh';});
}

window.addEventListener('load', function(){ showMotd(); loadSavedKey(); });
</script>
</body>
</html>
