<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashley's Daily Job Report</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem; }
.container { max-width: 820px; margin: 0 auto; }
.header { padding-bottom: 1rem; border-bottom: 1px solid #e0dfd8; margin-bottom: 1.5rem; }
.header h1 { font-size: 22px; font-weight: 500; }
.header p { font-size: 13px; color: #888780; margin-top: 4px; }
.api-box { background: white; border: 1px solid #e0dfd8; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; }
.api-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.api-box label { font-size: 13px; color: #5f5e5a; white-space: nowrap; }
.api-box input { flex: 1; min-width: 200px; border: 1px solid #d3d1c7; border-radius: 8px; padding: 6px 10px; font-size: 13px; font-family: monospace; color: #1a1a18; background: #f5f5f3; }
.api-note { font-size: 11px; color: #888780; margin-top: 8px; }
.api-note a { color: #185FA5; }
.controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 1.5rem; }
.fb { background: white; border: 1px solid #d3d1c7; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; color: #1a1a18; }
.fb.active { background: #f1efe8; border-color: #888780; font-weight: 500; }
.rb { background: white; border: 1px solid #d3d1c7; border-radius: 8px; padding: 6px 14px; font-size: 13px; cursor: pointer; margin-left: auto; color: #1a1a18; }
.rb:disabled { opacity: 0.45; cursor: not-allowed; }
.card { background: white; border: 1px solid #e0dfd8; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
.jtitle { font-size: 15px; font-weight: 500; }
.jco { font-size: 13px; color: #888780; margin-top: 2px; }
.badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.badge { font-size: 11px; padding: 3px 9px; border-radius: 99px; }
.bp { background: #EEEDFE; color: #3C3489; }
.bl { background: #E6F1FB; color: #0C447C; }
.bg { background: #EAF3DE; color: #3B6D11; }
.bs { background: #f1efe8; color: #5f5e5a; border: 1px solid #e0dfd8; }
.jsumm { font-size: 13px; color: #5f5e5a; margin-top: 10px; line-height: 1.6; }
.jlink { display: inline-block; margin-top: 10px; font-size: 13px; color: #185FA5; text-decoration: none; }
.loading { text-align: center; padding: 3rem; color: #888780; font-size: 14px; }
.spinner { width: 28px; height: 28px; border: 2px solid #e0dfd8; border-top-color: #888780; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.errmsg { background: #fcebeb; border: 1px solid #f7c1c1; border-radius: 8px; padding: 1rem; font-size: 13px; color: #a32d2d; margin-bottom: 1rem; }
.errmsg code { font-family: monospace; font-size: 11px; display: block; margin-top: 6px; white-space: pre-wrap; word-break: break-all; }
.cnt { display: inline-block; background: #f1efe8; border: 1px solid #e0dfd8; border-radius: 99px; font-size: 12px; padding: 2px 9px; margin-left: 8px; color: #888780; }
.empty { font-size: 14px; color: #888780; padding: 2rem 0; text-align: center; }
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>Ashley's daily job report <span class="cnt" id="cnt" style="display:none"></span></h1>
<p id="subtitle">Career change targets &middot; med-device, MSL, product, clinical ed, sales ops</p>
</div>
<div class="api-box">
<div class="api-row">
<label for="apikey">Anthropic API key</label>
<input type="password" id="apikey" placeholder="sk-ant-..." autocomplete="off" />
</div>
<div class="api-note">Required. Get a free key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a> &rarr; API Keys. Never stored.</div>
</div>
<div class="controls">
<button class="fb active" onclick="setFilter('all',this)">All</button>
<button class="fb" onclick="setFilter('product',this)">Product / APM</button>
<button class="fb" onclick="setFilter('msl',this)">MSL</button>
<button class="fb" onclick="setFilter('sales',this)">Sales / enablement</button>
<button class="fb" onclick="setFilter('cs',this)">Client success</button>
<button class="fb" onclick="setFilter('clinical',this)">Clinical ed</button>
<button class="fb" onclick="setFilter('remote',this)">Remote</button>
<button class="rb" id="rbtn" onclick="fetchJobs()">&#8635; Refresh listings</button>
</div>
<div id="status"></div>
<div id="jobs"><div class="empty">Enter your API key above and click &#8635; Refresh listings to get started.</div></div>
</div>
<script>
var allJobs=[],activeFilter='all';
var TITLES="Associate Product Manager (medical device), Product Manager (medical device), Medical Science Liaison, Sales Force Enablement / Training, Client Success Manager, Clinical Education Specialist, Staff Sales Operations Analyst, Customer Success / Account Manager";
var COMPANIES="BD, Arthrex, Stryker, Medtronic, Biotronik, Abbott, Zimmer Biomet, Boston Scientific, Insulet, Edwards Lifesciences, DePuy Synthes, Dexcom, Intuitive Surgical, Smith & Nephew, Globus Medical, Synergy Spine Solutions, Gore, Personify Health, Prompt AI, Ambience Healthcare, Limber Health";
function catLabel(c){return({product:'Product / APM',msl:'MSL',sales:'Sales / enablement',cs:'Client success',clinical:'Clinical ed',ops:'Sales ops'})[c]||c;}
function escHtml(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setFilter(f,btn){activeFilter=f;document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');renderJobs();}
function renderJobs(){var c=document.getElementById('jobs'),el=document.getElementById('cnt'),list=allJobs;if(activeFilter==='remote')list=allJobs.filter(function(j){return j.isRemote;});else if(activeFilter!=='all')list=allJobs.filter(function(j){return j.category===activeFilter;});el.style.display='';el.textContent=list.length+' jobs';if(!list.length){c.innerHTML='<div class="empty">No listings matched this filter.</div>';return;}c.innerHTML=list.map(function(j){return'<div class="card"><div class="jtitle">'+escHtml(j.title)+'</div><div class="jco">'+escHtml(j.company)+'</div><div class="badges"><span class="badge bp">'+catLabel(j.category)+'</span><span class="badge bl">'+escHtml(j.location)+'</span>'+(j.isRemote?'<span class="badge bg">Remote</span>':'')+(j.salary?'<span class="badge bs">'+escHtml(j.salary)+'</span>':'')+'</div><div class="jsumm">'+escHtml(j.summary)+'</div>'+(j.url?'<a class="jlink" href="'+escHtml(j.url)+'" target="_blank">View listing &rarr;</a>':'')+'</div>';}).join('');}
function showError(msg,detail){document.getElementById('jobs').innerHTML='';document.getElementById('status').innerHTML='<div class="errmsg">'+msg+(detail?'<code>'+escHtml(detail)+'</code>':'')+'</div>';}
function fetchJobs(){var key=document.getElementById('apikey').value.trim();if(!key){showError('Please enter your Anthropic API key above first.',null);return;}var btn=document.getElementById('rbtn');btn.disabled=true;btn.textContent='Searching...';document.getElementById('status').innerHTML='';document.getElementById('jobs').innerHTML='<div class="loading"><div class="spinner"></div>Searching across target companies, takes 20-30 seconds...</div>';document.getElementById('cnt').style.display='none';var today=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});var prompt='Today is '+today+'. Ashley is a licensed PT (DPT, OCS), 15 yrs exp, Clinic Director at Banner PT in Mesa AZ, pivoting to med-device/health-tech. Orthopedic/MSK expertise, P&L, team building, clinical instruction.\n\nFind CURRENT job listings. TITLES: '+TITLES+'. COMPANIES: '+COMPANIES+'. LOCATION: Phoenix metro AZ or remote-eligible AZ.\n\nReturn ONLY raw JSON array:\n[{"title":"...","company":"...","location":"...","salary":"...or null","summary":"2-3 sentences why great fit for Ashley","url":"...or null","isRemote":true,"category":"product|msl|sales|cs|clinical|ops"}]\n\nOnly real listings found today.';fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:prompt}]})}).then(function(r){if(!r.ok)return r.text().then(function(t){throw new Error('HTTP '+r.status+': '+t);});return r.json();}).then(function(d){if(d.error)throw new Error(d.error.message);var raw='';(d.content||[]).forEach(function(b){if(b.type==='text')raw+=b.text;});raw=raw.replace(/```json|```/g,'').trim();var s=raw.indexOf('['),e=raw.lastIndexOf(']');if(s<0||e<0)throw new Error('No JSON found: '+raw.slice(0,200));allJobs=JSON.parse(raw.slice(s,e+1));if(!allJobs.length)throw new Error('No results. Try refreshing.');document.getElementById('subtitle').textContent='Last refreshed '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})+' · '+today;renderJobs();}).catch(function(err){showError('Error:',err.message);}).finally(function(){btn.disabled=false;btn.textContent='↻ Refresh listings';});}
</script>
</body>
</html>
